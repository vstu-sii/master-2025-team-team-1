name: Full Stack CI

on:
  push:
    branches: [ main, feedback, develop ]
  pull_request:
    branches: [ main, feedback, develop ]

jobs:
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
    
    - name: Install dependencies
      run: npm ci
    
    - name: TypeScript check
      run: npx tsc --noEmit
    
    - name: Lint
      run: npm run lint
    
    #- name: Test
    #  run: npm test -- --passWithNoTests
    
    - name: Build
      run: npm run build

  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: './backend/requirements.txt'
    
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Run tests
      run: |
        pip install pytest
        pytest -v || echo "No tests found"

  database-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Wait for PostgreSQL
      run: sleep 10
    
    - name: Test database connection
      run: |
        pg_isready -h localhost -p 5432 -U user -d test_db

  llm-service-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./llm-service
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: './llm-service/requirements.txt'
    
    - name: Install dependencies
      run: pip install -r requirements.txt || echo "No requirements.txt"
    
    - name: Check notebook syntax
      run: |
        pip install nbconvert
        python -c "
        import json
        for notebook in ['*.ipynb']:
            try:
                with open(notebook) as f:
                    json.load(f)
                print(f'✓ {notebook} is valid JSON')
            except Exception as e:
                print(f'✗ {notebook} error: {e}')
        " || echo "No notebooks to check"

  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test, database-migrations, llm-service-test]
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker images
      run: |
        docker compose -f docker-compose.dev.yml build
    
    - name: Test Docker Compose
      run: |
        docker compose -f docker-compose.dev.yml up -d
        sleep 30
        docker compose -f docker-compose.dev.yml ps
        docker compose -f docker-compose.dev.yml down