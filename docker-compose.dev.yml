version: '3.8'

networks:
  app-network:
    driver: bridge

services:
  # PostgreSQL
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    networks:
      - app-network  
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # Backend (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    networks:
      - app-network
    environment:
      DATABASE_URL: postgresql://myuser:mypass@db:5432/mydb
      LANGFUSE_PUBLIC_KEY: pk-lf-1ce9069b-e37a-4f74-8c55-e8a2642025fe
      LANGFUSE_SECRET_KEY: sk-lf-49f7a7be-037a-4ec9-b1e2-efcba447f32e
      LANGFUSE_HOST: http://localhost:3002
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - app-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    command: npm run dev

  # LLM Service + Jupyter
  llm:
    build:
      context: ./llm-service
      dockerfile: Dockerfile
    ports:
      - "8888:8888"
    networks:
      - app-network
    volumes:
      - ./llm-service:/workspace
    working_dir: /workspace
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='' --NotebookApp.password=''

volumes:
  postgres_data: